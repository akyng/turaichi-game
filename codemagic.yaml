workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials # Define these in Codemagic UI
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install Expo CLI and EAS CLI
        script: |
          npm install -g expo-cli eas-cli
      - name: Build Android App Bundle (AAB) using EAS
        script: |
          # Decode base64 environment variables back into files
          if [ ! -z "$CREDENTIALS_JSON_BASE64" ]; then
            echo "$CREDENTIALS_JSON_BASE64" | base64 --decode > ./credentials.json
          fi
          if [ ! -z "$TURAICHI_KEYSTORE_BASE64" ]; then
            echo "$TURAICHI_KEYSTORE_BASE64" | base64 --decode > ./turaichi.keystore
          fi
          
          # EAS build --local will use credentials.json and the keystore file.
          eas build --platform android --local --profile production --non-interactive
    artifacts:
      - ./*.aab
      - ./*.apk
    publishing:
      email:
        recipients:
          - akyng@example.com # Replace with actual email
        notify:
          success: true
          failure: true
